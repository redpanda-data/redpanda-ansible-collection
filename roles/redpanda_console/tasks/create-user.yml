---
- name: Create redpanda group
  ansible.builtin.group:
    name: "{{ redpanda_group }}"
    state: present
    system: true
  become: true

- name: Create redpanda user
  ansible.builtin.user:
    name: "{{ redpanda_user }}"
    group: "{{ redpanda_group }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false
    state: present
  become: true

- name: Create redpanda-console group
  ansible.builtin.group:
    name: "{{ redpanda_console_group }}"
    state: present
    system: true
  become: true

- name: Create redpanda-console user
  ansible.builtin.user:
    name: "{{ redpanda_console_user }}"
    group: "{{ redpanda_console_group }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false
    state: present
  become: true

- name: Check if broker is co-located
  ansible.builtin.set_fact:
    redpanda_console_broker_colocated: "{{ inventory_hostname in groups['redpanda'] | default([]) }}"

- name: Add redpanda-console user to redpanda group for cert access
  ansible.builtin.user:
    name: "{{ redpanda_console_user }}"
    groups: "{{ redpanda_group }}"
    append: true
  become: true
  when:
    - handle_cert_install | default(false) | bool
    - redpanda_console_broker_colocated
