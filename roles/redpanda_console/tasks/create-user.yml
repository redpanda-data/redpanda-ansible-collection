- name: Create redpanda group
  group:
    name: "{{ redpanda_group }}"
    state: present
    system: true
  become: true

- name: Create redpanda user
  user:
    name: "{{ redpanda_user }}"
    group: "{{ redpanda_group }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false
    state: present
  become: true
