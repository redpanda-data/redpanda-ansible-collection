# Kafka Cluster connection values
is_using_private: false # set to true if you'd prefer it connected using the private IP
kafka_port: 9092

# converters
key_converter: "org.apache.kafka.connect.json.JsonConverter"
value_converter: "org.apache.kafka.connect.json.JsonConverter"

# connect topics
config_storage_topic: "connect-configs"
offset_storage_topic: "connect-offsets"
status_storage_topic: "connect-status"

# config directory
redpanda_connect_config_dir: "/opt/kafka/config"

# user and group
redpanda_user: redpanda
redpanda_group: redpanda

java_home: /usr/lib/jvm/java-17-openjdk

# required binary install values
redpanda_connect_rpm: "redpanda-connect.x86_64.rpm"
redpanda_connect_rpm_dir: "/tmp"

# networking
advertise_public_address: true
schema_registry_url: "http://localhost:8081"
rest_advertised_host_name: "localhost"
rest_port: 8083
rest_advertised_port: 8083

# group and plugins
group_id: "redpanda-kc"
plugin_path: "/opt/kafka/redpanda-plugins"

# security
connect_tls_enabled:  false
connect_trusted_certs: false
connect_tls_auth_cert: false
connect_tls_auth_key: false

# used when connect_tls_enabled are true
security_protocol: SSL

# kafka_connect_run.sh
redpanda_connect_home: "/opt/kafka"

# used when connect_tls_enabled and connect_trusted_certs are true
ssl_truststore_location: /tmp/kafka/cluster.truststore.p12
ssl_truststore_password: "{{ certs_store_password }}"
ssl_truststore_type: PKCS12
producer_ssl_truststore_location: /tmp/kafka/cluster.truststore.p12
producer_ssl_truststore_password: "{{ certs_store_password }}"
consumer_ssl_truststore_location: /tmp/kafka/cluster.truststore.p12
consumer_ssl_truststore_password: "{{ certs_store_password }}"
admin_ssl_truststore_location: /tmp/kafka/cluster.truststore.p12
admin_ssl_truststore_password: "{{ certs_store_password }}"

# use when connect_tls_enabled, connect_tls_auth_cert and connect_tls_auth_key are true
ssl_keystore_location: /tmp/kafka/cluster.keystore.p12
ssl_keystore_password: "{{ certs_store_password }}"
ssl_keystore_type: PKCS12
producer_ssl_keystore_location: /tmp/kafka/cluster.keystore.p12
producer_ssl_keystore_password: "{{ certs_store_password }}"
producer_ssl_keystore_type: PKCS12
consumer_ssl_keystore_location: /tmp/kafka/cluster.keystore.p12
consumer_ssl_keystore_password: "{{ certs_store_password }}"
consumer_ssl_keystore_type: PKCS12
admin_ssl_keystore_location: /tmp/kafka/cluster.keystore.p12
admin_ssl_keystore_password: "{{ certs_store_password }}"
admin_ssl_keystore_type: PKCS12

# log4j values
log4j_rootlogger: "INFO, stdout, kafkaAppender"

log4j_appender_stdout: "org.apache.log4j.ConsoleAppender"
log4j_appender_stdout_layout: "org.apache.log4j.PatternLayout"
log4j_appender_stdout_layout_conversionpattern: "[%d] %p %m (%c)%n"

log4j_appender_kafkaappender: "org.apache.log4j.DailyRollingFileAppender"
log4j_appender_kafkaappender_datepattern: "'.'yyyy-MM-dd-HH"
log4j_appender_kafkaappender_file: "${kafka.logs.dir}/server.log"
log4j_appender_kafkaappender_layout: "org.apache.log4j.PatternLayout"
log4j_appender_kafkaappender_layout_conversionpattern: "[%d] %p %m (%c)%n"

log4j_appender_statechangeappender: "org.apache.log4j.DailyRollingFileAppender"
log4j_appender_statechangeappender_datepattern: "'.'yyyy-MM-dd-HH"
log4j_appender_statechangeappender_file: "${kafka.logs.dir}/state-change.log"
log4j_appender_statechangeappender_layout: "org.apache.log4j.PatternLayout"
log4j_appender_statechangeappender_layout_conversionpattern: "[%d] %p %m (%c)%n"

log4j_appender_requestappender: "org.apache.log4j.DailyRollingFileAppender"
log4j_appender_requestappender_datepattern: "'.'yyyy-MM-dd-HH"
log4j_appender_requestappender_file: "${kafka.logs.dir}/kafka-request.log"
log4j_appender_requestappender_layout: "org.apache.log4j.PatternLayout"
log4j_appender_requestappender_layout_conversionpattern: "[%d] %p %m (%c)%n"

log4j_appender_cleanerappender: "org.apache.log4j.DailyRollingFileAppender"
log4j_appender_cleanerappender_datepattern: "'.'yyyy-MM-dd-HH"
log4j_appender_cleanerappender_file: "${kafka.logs.dir}/log-cleaner.log"
log4j_appender_cleanerappender_layout: "org.apache.log4j.PatternLayout"
log4j_appender_cleanerappender_layout_conversionpattern: "[%d] %p %m (%c)%n"

log4j_appender_controllerappender: "org.apache.log4j.DailyRollingFileAppender"
log4j_appender_controllerappender_datepattern: "'.'yyyy-MM-dd-HH"
log4j_appender_controllerappender_file: "${kafka.logs.dir}/controller.log"
log4j_appender_controllerappender_layout: "org.apache.log4j.PatternLayout"
log4j_appender_controllerappender_layout_conversionpattern: "[%d] %p %m (%c)%n"

log4j_appender_authorizerappender: "org.apache.log4j.DailyRollingFileAppender"
log4j_appender_authorizerappender_datepattern: "'.'yyyy-MM-dd-HH"
log4j_appender_authorizerappender_file: "${kafka.logs.dir}/kafka-authorizer.log"
log4j_appender_authorizerappender_layout: "org.apache.log4j.PatternLayout"
log4j_appender_authorizerappender_layout_conversionpattern: "[%d] %p %m (%c)%n"

log4j_logger_orgapachezookeeper: "INFO"

log4j_logger_kafka: "INFO"
log4j_logger_orgapachekafka: "INFO"

log4j_logger_kafkarequestlogger: "WARN, requestAppender"
log4j_additivity_kafkarequestlogger: "false"

log4j_logger_kafkanetworkrequestchannel: "WARN, requestAppender"
log4j_additivity_kafkanetworkrequestchannel: "false"

log4j_logger_orgapachekafkacontroller: "INFO, controllerAppender"
log4j_additivity_orgapachekafkacontroller: "false"

log4j_logger_kafkacontroller: "TRACE, controllerAppender"
log4j_additivity_kafkacontroller: "false"

log4j_logger_kafkaloglogcleaner: "INFO, cleanerAppender"
log4j_additivity_kafkaloglogcleaner: "false"

log4j_logger_statechangelogger: "INFO, stateChangeAppender"
log4j_additivity_statechangelogger: "false"

log4j_logger_kafkaauthorizerlogger: "INFO, authorizerAppender"
log4j_additivity_kafkaauthorizerlogger: "false"
