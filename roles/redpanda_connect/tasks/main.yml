- name: Create user
  ansible.builtin.include_tasks: create-user.yml
  when: not (restart_only | default(false))

- name: Install JVM
  ansible.builtin.package:
      name: java-17-openjdk
      state: present
  when:
    - not use_existing_jvm | default(false)
    - not (restart_only | default(false))

- name: Set JAVA_HOME
  ansible.builtin.include_tasks: generate-java-home.yml
  when: not (restart_only | default(false))

- name: Copy truststore
  ansible.builtin.include_tasks: copy-truststore.yml
  when:
    - copy_truststore | default(false) | bool
    - not (restart_only | default(false))

- name: Install Certs
  ansible.builtin.include_tasks: install-certs.yml
  when:
    - copy_keystore | default(false) | bool
    - not (restart_only | default(false))

- name: Copy keystore
  ansible.builtin.include_tasks: copy-keystore.yml
  when:
    - copy_keystore | default(false) | bool
    - not (restart_only | default(false))

- name: Install Kafka Connect
  ansible.builtin.include_tasks: install-connect.yml
  when: not (restart_only | default(false))

- name: Configure Kafka Connect
  ansible.builtin.include_tasks: generate-connect-distributed.yml
  when: not (restart_only | default(false))

- name: Configure Log4j Config File
  ansible.builtin.include_tasks: generate-log4j-config.yml
  when: not (restart_only | default(false))

- name: Generate JMX Exporter Config
  ansible.builtin.include_tasks: generate-jmx-exporter-config.yml
  when: not (restart_only | default(false))

- name: Configure Systemd Unit File
  ansible.builtin.include_tasks: generate-unit-file.yml
  when: not (restart_only | default(false))

- name: Reload systemd daemon if unit file changed
  ansible.builtin.systemd_service:
    daemon_reload: true
  when:
    - systemd_unit_result.changed | default(false)
    - inventory_hostname in groups[redpanda_connect_group]
    - not (restart_only | default(false))

- name: Establish whether restart required
  ansible.builtin.set_fact:
    restart_required: '{{ restart_only | default(false) or ((connect_distributed_config_result.changed | default(false) or log4j_user_config_result.changed | default(false) or log4j_default_config_result.changed | default(false) or systemd_unit_result.changed | default(false)) and (restart_connect_node | default(true) | bool)) }}'

- name: Ensure Redpanda Connect is enabled and started
  ansible.builtin.systemd_service:
    name: redpanda-connect
    state: started
    enabled: true
  when:
    - inventory_hostname in groups[redpanda_connect_group]
    - not (restart_only | default(false))

# Safe restart with serialization - one node at a time
- name: Safe Restart
  ansible.builtin.include_tasks: safe-restart.yml
  with_items: "{{ ansible_play_hosts }}"
  loop_control:
    loop_var: cluster_host
  tags:
    - restart
