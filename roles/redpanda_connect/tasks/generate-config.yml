- name: Identify advertised address
  ansible.builtin.set_fact:
    advertised_ip: "{{ inventory_hostname if (advertise_public_address | bool) else private_ip }}"

- name: Instantiate a template
  template:
    src: kc.properties.j2
    dest: "{{ redpanda_connect_config_dir }}/kc.properties"
    owner: "{{ redpanda_user }}"
    group: "{{ redpanda_group }}"
    mode: '0644'
